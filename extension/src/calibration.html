<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AirKVM Calibration</title>
    <style>
      :root {
        --bg: #f7f1df;
        --ink: #1f2937;
        --accent: #b91c1c;
        --grid: rgba(185, 28, 28, 0.18);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Menlo, Monaco, Consolas, monospace;
        color: var(--ink);
        background:
          linear-gradient(90deg, var(--grid) 1px, transparent 1px) 0 0 / 48px 48px,
          linear-gradient(var(--grid) 1px, transparent 1px) 0 0 / 48px 48px,
          var(--bg);
      }
      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        position: relative;
      }
      .corner-target {
        position: fixed;
        width: 42px;
        height: 42px;
        border: 4px solid var(--accent);
        border-radius: 50%;
        background:
          radial-gradient(circle at center, rgba(185, 28, 28, 0.2) 0 5px, transparent 5px 100%),
          #fff7f7;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
        pointer-events: none;
      }
      .corner-target::after {
        content: '';
        position: absolute;
        left: 50%;
        top: 50%;
        width: 10px;
        height: 10px;
        margin-left: -5px;
        margin-top: -5px;
        border-radius: 50%;
        background: var(--accent);
      }
      .corner-target.tl { left: 28px; top: 28px; }
      .corner-target.tr { right: 28px; top: 28px; }
      .corner-target.bl { left: 28px; bottom: 28px; }
      .corner-target.br { right: 28px; bottom: 28px; }
      .target {
        width: min(80vw, 680px);
        min-height: min(60vh, 420px);
        border: 5px solid var(--accent);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.55);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.16);
        display: grid;
        place-items: center;
        text-align: center;
        padding: 32px;
      }
      .target-inner {
        display: grid;
        place-items: center;
        gap: 20px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(32px, 5vw, 60px);
      }
      p {
        margin: 0;
        font-size: clamp(18px, 2.2vw, 28px);
        line-height: 1.35;
      }
      button {
        font: inherit;
        font-size: clamp(24px, 3vw, 34px);
        padding: 16px 28px;
        border: 4px solid var(--accent);
        border-radius: 18px;
        background: #fff7f7;
        color: var(--accent);
        cursor: pointer;
        min-width: 220px;
      }
      .dot {
        position: fixed;
        left: 24px;
        top: 24px;
        width: 28px;
        height: 28px;
        margin-left: -14px;
        margin-top: -14px;
        border-radius: 50%;
        border: 4px solid var(--accent);
        background: rgba(185, 28, 28, 0.18);
        pointer-events: none;
        transition: transform 40ms linear;
      }
      .status {
        position: fixed;
        right: 16px;
        bottom: 16px;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(31, 41, 55, 0.9);
        color: #f9fafb;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="dot" id="dot"></div>
    <div class="corner-target tl" id="corner-tl"></div>
    <div class="corner-target tr" id="corner-tr"></div>
    <div class="corner-target bl" id="corner-bl"></div>
    <div class="corner-target br" id="corner-br"></div>
    <div class="wrap">
      <div class="target" id="target">
        <div class="target-inner">
          <div>
          <h1>CALIBRATION</h1>
          <p>Move the HID cursor into this popup.</p>
          </div>
          <button id="done" type="button">DONE</button>
        </div>
      </div>
    </div>
    <div class="status" id="status">Waiting for pointer…</div>
    <script type="module" src="./calibration.js"></script>
  </body>
  </html>
