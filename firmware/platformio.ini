[platformio]
default_envs = esp32dev

[env]
framework = arduino
monitor_speed = 115200
build_flags =
  -std=gnu++17

[env:esp32dev]
platform = espressif32
board = esp32dev
lib_deps =
  h2zero/NimBLE-Arduino @ ^1.4.3

[env:native]
platform = native
test_framework = unity
build_flags =
  -std=gnu++17
